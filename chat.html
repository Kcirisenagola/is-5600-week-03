<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }
    #messages {
      border: 1px solid #ccc;
      padding: 1rem;
      height: 300px;
      overflow-y: auto;
      background-color: #f9f9f9;
      margin-bottom: 1rem;
    }
    input[type="text"] {
      width: 300px;
      padding: 0.5rem;
    }
    button {
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>
  <h1>Chat Room</h1>
  <div id="messages"></div>
  <form id="form">
    <input type="text" id="input" autocomplete="off" placeholder="Type your message..." required />
    <button type="submit">Send</button>
  </form>

  <script src="/chat.js"></script>
</body>
</html>
